spring:
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.rag.common.event"
  data:
    redis:
      host: redis
      port: 6379

eureka:
  client:
    # registerWithEureka: true
    # fetchRegistry: true
    # enabled: true
    # # Retry failed registrations instead of crashing
    # initialInstanceInfoReplicationIntervalSeconds: 10
    # instanceInfoReplicationIntervalSeconds: 10
    service-url:
      defaultZone: http://admin:admin@service-registry:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

spring.application.name: ${SERVICE_NAME:unknown}
logging:
  pattern:
    correlation: "[%X{traceId}/%X{spanId}] "
