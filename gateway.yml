server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: ingestion
          uri: lb://ingestion-service
          predicates:
            - Path=/api/v1/documents/**
        - id: query
          uri: lb://query-orchestrator
          predicates:
            - Path=/api/v1/query/**
        - id: retrieval
          uri: lb://retrieval-service
          predicates:
            - Path=/api/v1/retrieval/**
        - id: graph
          uri: lb://graph-service
          predicates:
            - Path=/api/v1/graph/**
        - id: llm-proxy
          uri: lb://llm-proxy
          predicates:
            - Path=/api/v1/llm/**
        - id: fast-graphrag
          uri: lb://fast-graphrag-service
          predicates:
            - Path=/api/v1/fast-graphrag/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/rag/protocol/openid-connect/certs

  data:
    redis:
      host: redis
      port: 6379
