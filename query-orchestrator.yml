server:
  port: 8084

spring:
  application:
    name: query-orchestrator
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/rag/protocol/openid-connect/certs
          issuer-uri: http://localhost:8180/realms/rag
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat.options:
        model: gpt-4o-mini
        temperature: 0.7
  data:
    redis:
      host: redis
      port: 6379
    mongodb:
      uri: mongodb://mongo:27017/ragdb
  cloud:
    discovery:
      client:
        simple:
          instances:
            retrieval-service:
              - host: retrieval-service
                port: 8086
            graph-service:
              - host: graph-service
              - port: 8083

feign:
  client:
    config:
      default:
        readTimeout: 10000

resilience4j:
  circuitbreaker:
    instances:
      retrieval-cb:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 30s
        minimumNumberOfCalls: 3
      graph-cb:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 30s
        minimumNumberOfCalls: 3
      llm-cb:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 60s
        minimumNumberOfCalls: 3
  timelimiter:
    instances:
      fast-graphrag-cb:
        timeoutDuration: 2000ms

rag:
  graph:
    backend: fast-graphrag

app:
  cache:
    query-ttl-seconds: 300
  retrieval:
    top-k: 10
  graph:
    backend: fast-graphrag   # values: legacy | fast-graphrag
